<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
  body {background:#ffe4e1; color:#333; overflow-x:hidden;}
  
  .container {display:flex; justify-content:center; align-items:center; flex-direction:column; height:100vh; text-align:center; padding:20px;}
  
  input[type="text"] {padding:10px 15px; border-radius:8px; border:1px solid #ff4d6d; font-size:18px;}
  button {padding:10px 20px; margin-top:15px; border:none; background:#ff4d6d; color:white; border-radius:8px; font-size:18px; cursor:pointer; transition:0.3s;}
  button:hover {background:#ff8fab;}
  
  h1 {font-family:'Great Vibes', cursive; font-size:50px; color:#ff4d6d; margin-bottom:20px;}
  p {font-size:20px; line-height:1.6; margin:15px 0;}
  
  .page {display:none; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; transition:0.5s;}
  .active {display:flex;}
  
  .story-box {background:white; padding:20px; border-radius:15px; max-width:600px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:left; overflow:hidden; position:relative;}
  
  .nav-buttons {margin-top:20px; display:flex; justify-content:space-between; width:250px;}
  .typing {border-right:2px solid #ff4d6d; padding-right:5px; display:inline;}
</style>
</head>
<body>

<!-- Page 1: Name input -->
<div class="container page active" id="page1">
  <h1>Welcome!</h1>
  <p>What is your name?</p>
  <input type="text" id="nameInput" placeholder="Enter your name">
  <button onclick="startStory()">Start</button>
</div>

<!-- Page 2: Loading -->
<div class="container page" id="page2">
  <h1 id="welcomeName"></h1>
  <p>Please wait a few seconds...</p>
</div>

<!-- Page 3: How we met question -->
<div class="container page" id="page3">
  <div class="story-box">
    <h1>Wanna know how we met?</h1>
    <button onclick="nextPage('page4')">Click Here</button>
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage('page1')">⬅ Previous</button>
  </div>
</div>

<!-- Page 4: How we met story -->
<div class="container page" id="page4">
  <div class="story-box">
    <h1>How We Met</h1>
    <p id="story1" class="typing"></p>
    <button onclick="nextPage('page5')">Next ➡</button>
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage('page3')">⬅ Previous</button>
  </div>
</div>

<!-- Page 5: First special memory -->
<div class="container page" id="page5">
  <div class="story-box">
    <h1>My First Special Memory</h1>
    <p id="story2" class="typing"></p>
    <button onclick="nextPage('page6')">Next ➡</button>
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage('page4')">⬅ Previous</button>
  </div>
</div>

<!-- Page 6: 5 things I love about her -->
<div class="container page" id="page6">
  <div class="story-box" id="loveThings">
    <h1>5 Things I Love About You</h1>
    <p id="thing1" class="typing"></p>
    <p id="thing2" class="typing"></p>
    <p id="thing3" class="typing"></p>
    <p id="thing4" class="typing"></p>
    <p id="thing5" class="typing"></p>
    <button onclick="nextPage('page7')">Next ➡</button>
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage('page5')">⬅ Previous</button>
  </div>
</div>

<!-- Page 7: Future -->
<div class="container page" id="page7">
  <div class="story-box">
    <h1>The Future I Dream Of</h1>
    <p id="story3" class="typing"></p>
    <button onclick="nextPage('page8')">Next ➡</button>
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage('page6')">⬅ Previous</button>
  </div>
</div>

<!-- Page 8: Final message -->
<div class="container page" id="page8">
  <div class="story-box">
    <h1>❤️ Final Message ❤️</h1>
    <p id="story4" class="typing"></p>
    <button onclick="prevPage('page7')">⬅ Previous</button>
  </div>
</div>

<script>
  let nameValue = '';

  function startStory() {
    const input = document.getElementById('nameInput').value.trim();
    if(input === '') {alert('Please enter a name!'); return;}
    nameValue = input;
    nextPage('page2');
    document.getElementById('welcomeName').innerText = `Welcome ${nameValue}`;
    setTimeout(()=>{nextPage('page3')}, 12000);
  }

  function nextPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    if(pageId==='page4') {typeWriter('story1', story1Text, 0);}
    if(pageId==='page5') {typeWriter('story2', story2Text, 0);}
    if(pageId==='page6') {
      typeWriter('thing1', thing1, 0);
      setTimeout(()=>{typeWriter('thing2', thing2, 0);},1500);
      setTimeout(()=>{typeWriter('thing3', thing3, 0);},3000);
      setTimeout(()=>{typeWriter('thing4', thing4, 0);},4500);
      setTimeout(()=>{typeWriter('thing5', thing5, 0);},6000);
    }
    if(pageId==='page7') {typeWriter('story3', story3Text,0);}
    if(pageId==='page8') {typeWriter('story4', story4Text,0);}
  }

  function prevPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function typeWriter(id, text, i) {
    if(i < text.length){
      document.getElementById(id).innerHTML += text.charAt(i);
      setTimeout(()=>{typeWriter(id, text, i+1)}, 50);
    }
  }

  // Story texts
  const story1Text = `Our story started in a very unexpected way. You were my school fellow, and one day I decided to message you. Instead of a friendly start, we actually had an argument. You even threatened to tell the vice principal about me. But somehow, even after that, I kept messaging you and annoying you again and again. After some time we stopped talking for a while. Then something surprising happened — you apologized for your behavior. Slowly our conversations started again. That simple conversation turned into friendship, and that friendship slowly turned into something much more beautiful. Today, Alhamdulillah, it has been almost 3.5 years of knowing you.`;
  
  const story2Text = `One of my most special memories with you is not a single moment, but a phase of my life. There was a time when I was completely broken. Everything felt confusing and heavy. And that was exactly when you came into my life. You didn't just stay — you helped me heal. You supported me in every possible way. You understood my pain and stood beside me when I needed someone the most. You gave me so much love and care that slowly I started becoming myself again.`;

  const thing1 = `1. You understand me in every situation, even when I cannot explain myself properly.`;
  const thing2 = `2. You stand beside me everywhere and never judge me. You support me the way very few people can.`;
  const thing3 = `3. Even with all my restrictions and habits, you still understand me and accept them.`;
  const thing4 = `4. Usually girls have the attitude and boys handle it, but in our case I am the one with the nakhre — and somehow you still manage them.`;
  const thing5 = `5. Whenever we fight or misunderstand each other, you never sleep until everything between us is clear again. That means a lot to me.`;

  const story3Text = `When I think about the future, I imagine a relationship that always stays healthy and strong. A relationship where we keep understanding each other, where misunderstandings never become bigger than our bond. I hope we continue supporting each other in every stage of life, watching each other grow and succeed. And one day, InshaAllah, turn this beautiful relationship into something official.`;

  const story4Text = `Out of all the moments in my life, meeting you will always be my favorite one. Thank you for being part of my story. You are my favorite chapter ❤️`;
</script>

</body>
</html>
